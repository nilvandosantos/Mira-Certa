<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Mira Certa — Pontuação de Tiro com Arco</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B2418">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;background:#1B2418;color:#F3EFE3;font-family:Inter}
.wrap{max-width:480px;margin:auto;padding:10px}
.brand{font-family:Bebas Neue;font-size:30px;color:#E8B23A}
button{padding:10px;border-radius:10px;border:none;background:#E8B23A;font-weight:bold}
.scoreboard{display:flex;justify-content:space-around;margin:10px 0}
svg{width:100%}
</style>

</head>

<body>

<div class="wrap">
<div class="brand">MIRA CERTA</div>

<div class="scoreboard">
<div>Round: <span id="sbEnd">1</span></div>
<div>Flechas: <span id="sbArrow">0/6</span></div>
<div>Total: <span id="sbTotal">0</span></div>
</div>

<svg id="target" viewBox="0 0 600 600"></svg>

<p>Toque no alvo onde a flecha acertou.</p>

<button onclick="undoLast()">Desfazer</button> <button onclick="registerMiss()">Errou</button> <button onclick="closeEnd()">Novo Round</button> <button onclick="exportPDF()">Exportar PDF</button>

<div id="log"></div>

</div>

<script>
const R=260,CX=300,CY=300;

let state={arrowsPerEnd:6,ends:[],current:[]};

const hitSound=new Audio("https://assets.mixkit.co/sfx/preview/mixkit-arcade-retro-jump-223.wav");

function saveState(){
 localStorage.setItem("miraCerta",JSON.stringify(state));
}
function loadState(){
 let s=localStorage.getItem("miraCerta");
 if(s) state=JSON.parse(s);
}

function buildTarget(){
 let svg=document.getElementById("target");
 let html="";
 for(let n=1;n<=10;n++){
  let r=R*(11-n)/10;
  html+=`<circle cx="${CX}" cy="${CY}" r="${r}" fill="${n>8?'#E8B23A':n>6?'#E2564A':n>4?'#4A8FD6':n>2?'#000':'#fff'}"/>`;
 }
 html+=`<g id="markers"></g>`;
 svg.innerHTML=html;
 svg.addEventListener("pointerdown",onTap);
}

function svgPoint(evt){
 let rect=target.getBoundingClientRect();
 return {
  x:(evt.clientX-rect.left)*(600/rect.width),
  y:(evt.clientY-rect.top)*(600/rect.height)
 };
}

function score(dx,dy){
 let d=Math.sqrt(dx*dx+dy*dy);
 if(d>R)return 0;
 return 10-Math.floor(d/(R/10));
}

function onTap(evt){
 if(state.current.length>=state.arrowsPerEnd)return;

 let p=svgPoint(evt);
 let dx=p.x-CX,dy=p.y-CY;

 let ring=score(dx,dy);

 state.current.push({x:p.x,y:p.y,ring});

 hitSound.currentTime=0;
 hitSound.play();

 if(navigator.vibrate) navigator.vibrate(50);

 redraw();
 update();
 saveState();
}

function redraw(){
 let layer=document.getElementById("markers");
 let html="";
 state.current.forEach(a=>{
  if(a.x==null)return;
  html+=`<circle cx="${a.x}" cy="${a.y}" r="10" fill="#2FD9C4"/>`;
 });
 layer.innerHTML=html;
}

function update(){
 sbEnd.textContent=state.ends.length+1;
 sbArrow.textContent=state.current.length+"/"+state.arrowsPerEnd;
 let total=state.ends.flat().reduce((a,b)=>a+b.ring,0)+state.current.reduce((a,b)=>a+b.ring,0);
 sbTotal.textContent=total;
 renderLog();
}

function renderLog(){
 let html="";
 state.ends.forEach((e,i)=>{
  html+=`<div>Round ${i+1}: ${e.map(a=>a.ring).join(",")}</div>`;
 });
 log.innerHTML=html;
}

function undoLast(){
 state.current.pop();
 redraw();
 update();
 saveState();
}

function registerMiss(){
 state.current.push({x:null,y:null,ring:0});
 update();
 saveState();
}

function closeEnd(){
 if(state.current.length==0)return;
 state.ends.push(state.current);
 state.current=[];
 redraw();
 update();
 saveState();
}

function exportPDF(){
 const {jsPDF}=window.jspdf;
 let doc=new jsPDF();
 let y=10;

 doc.text("Relatório Mira Certa",10,y);

 state.ends.forEach((e,i)=>{
  y+=10;
  doc.text(`Round ${i+1}: ${e.map(a=>a.ring).join(",")}`,10,y);
 });

 doc.save("relatorio.pdf");
}

if('serviceWorker' in navigator){
 navigator.serviceWorker.register('service-worker.js');
}

loadState();
buildTarget();
update();
</script>

</body>
</html>
